<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف فهد و إلهام</title>

<!-- Elegant Arabic Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa&family=Lateef&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
  --gold-soft:#e7c873;
  --bg:#f6efe6;
  --bg2:#fff8f0;
}

body{
  margin:0;
  font-family:'Amiri',serif;
  background:linear-gradient(135deg,var(--bg),var(--bg2));
  overflow:hidden;
}

/* BACKGROUND WEDDING STYLE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,rgba(212,175,55,0.15),transparent 40%),
    radial-gradient(circle at 80% 80%,rgba(212,175,55,0.15),transparent 40%);
}

/* ENVELOPE */
.envelope{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  height:220px;
  background:#fff;
  border:2px solid var(--gold-soft);
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  cursor:pointer;
  overflow:hidden;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(180deg,#fff,var(--bg));
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:1s;
  z-index:2;
}

.envelope.open .flap{
  transform:rotateX(180deg);
}

.seal{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60px;
  height:60px;
  background:var(--gold);
  border-radius:50%;
  z-index:3;
}

/* CONTENT */
.content{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  transition:1s;
  text-align:center;
  padding:20px;
}

.show{
  opacity:1;
}

.basmala{
  font-family:'Lateef';
  font-size:42px;
}

.names{
  font-family:'Aref Ruqaa';
  font-size:50px;
  color:var(--gold);
}

/* PETALS */
.petal{
  position:absolute;
  width:12px;
  height:18px;
  background:var(--gold-soft);
  opacity:0.7;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-100px);} 
  to{transform:translateY(100vh);} 
}

</style>
</head>

<body>

<div class="envelope" id="env">
  <div class="flap"></div>
  <div class="seal"></div>
</div>

<div class="content" id="content">
  <div class="basmala">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيمِ</div>
  <p>والصلاة والسلام على أشرف المرسلين</p>
  <p>اللهم بارك لهما وبارك عليهما واجمع بينهما في الخير</p>

  <div class="names">فهد & إلهام</div>

  <p>الإثنين 21 ديسمبر 2026 - 20:00</p>
</div>

<script>
const env = document.getElementById('env');
const content = document.getElementById('content');

let opened=false;

env.onclick=()=>{
 if(opened) return;
 opened=true;
 env.classList.add('open');

 setTimeout(()=>{
   env.style.display='none';
   content.classList.add('show');
 },1000);
};

// petals
for(let i=0;i<20;i++){
 let p=document.createElement('div');
 p.className='petal';
 p.style.left=Math.random()*100+'%';
 p.style.animationDuration=(5+Math.random()*5)+'s';
 document.body.appendChild(p);
}
</script>

</body>
</html>
